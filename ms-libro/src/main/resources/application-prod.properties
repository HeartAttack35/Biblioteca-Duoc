# ══════════════════════════════════════════════════════════════════════════════
# Perfil PROD — ms-libro
# Uso: despliegue en Docker Compose, Railway, Render u otro entorno en la nube.
# Todas las propiedades sensibles se inyectan via variables de entorno.
# Activar con: SPRING_PROFILES_ACTIVE=prod  (lo setea el compose.yaml o la plataforma)
# ══════════════════════════════════════════════════════════════════════════════

# Base de datos: las variables de entorno son obligatorias en este perfil
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# URL de ms-autor inyectada por Docker/Railway (nombre de contenedor en red interna)
ms.autor.url=${MS_AUTOR_URL}

# Logs reducidos en producción para mejorar rendimiento y reducir ruido
logging.level.cl.duoc.biblioteca=INFO
logging.level.org.springframework.security=WARN
