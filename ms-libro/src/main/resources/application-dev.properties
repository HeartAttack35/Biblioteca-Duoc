# ══════════════════════════════════════════════════════════════════════════════
# Perfil DEV — ms-libro
# Uso: ejecución local directa desde el IDE sin Docker.
# Requiere MySQL corriendo en localhost:3307 con el schema 'ms-libro' creado
# y ms-autor corriendo en localhost:8083.
# Activar con: SPRING_PROFILES_ACTIVE=dev  (o es el valor por defecto)
# ══════════════════════════════════════════════════════════════════════════════

# Base de datos local con credenciales fijas (no sensible en este entorno)
spring.datasource.url=jdbc:mysql://localhost:3307/ms-libro
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# URL de ms-autor en entorno de desarrollo local
ms.autor.url=http://localhost:8083

# Logs más verbosos en desarrollo para facilitar el debug
logging.level.cl.duoc.biblioteca=DEBUG
logging.level.org.springframework.security=DEBUG
