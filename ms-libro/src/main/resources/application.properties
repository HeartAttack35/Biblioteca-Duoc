spring.application.name=ms-libro
server.port=${SERVER_PORT:8084}

# Perfil activo: se sobreescribe con la variable de entorno SPRING_PROFILES_ACTIVE.
# Por defecto usa 'dev' en local para conectarse a MySQL sin Docker.
# En Docker/prod se pasa SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Base de datos ──────────────────────────────────────────────────────────────
# Valores por defecto apuntan al entorno local sin Docker.
# El perfil prod sobreescribe con variables de entorno inyectadas por Docker/Railway.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:ms-libro}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Seguridad JWT ──────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:clave_super_secreta_12345678901234567890}

# ── Comunicación inter-servicios ───────────────────────────────────────────────
# URL del microservicio ms-autor para comunicación REST interna.
# En Docker se sobreescribe con el nombre del contenedor vía MS_AUTOR_URL.
ms.autor.url=${MS_AUTOR_URL:http://localhost:8083}

# ── Swagger / OpenAPI ──────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# URL del servidor que aparece en la UI de Swagger.
# Apunta al Gateway para que los "Try it out" funcionen correctamente.
app.swagger.server-url=${SWAGGER_SERVER_URL:http://localhost:8080}