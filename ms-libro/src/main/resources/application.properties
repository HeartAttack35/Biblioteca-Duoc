spring.application.name=ms-libro
server.port=${SERVER_PORT:8084}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:ms-libro}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:clave_super_secreta_12345678901234567890}

# URL del microservicio ms-autor para comunicación REST interna
ms.autor.url=${MS_AUTOR_URL:http://localhost:8083}