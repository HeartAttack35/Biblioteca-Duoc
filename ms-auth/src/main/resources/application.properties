spring.application.name=ms-auth
server.port=${SERVER_PORT:8082}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:ms-user}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.flyway.enabled=false

jwt.secret=${JWT_SECRET:clave_super_secreta_12345678901234567890}

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# URL del servidor que aparece en la UI de Swagger.
# Apunta al Gateway para que los "Try it out" funcionen correctamente.
app.swagger.server-url=${SWAGGER_SERVER_URL:http://localhost:8080}