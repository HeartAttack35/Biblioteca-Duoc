spring.application.name=ms-gateway
server.port=${SERVER_PORT:8080}

# Rutas del Gateway hacia cada microservicio.
# Las URIs usan variables de entorno para funcionar tanto en local (localhost)
# como en Docker (nombre del contenedor) sin cambiar el código.

spring.cloud.gateway.server.webmvc.routes[0].id=ms-auth
spring.cloud.gateway.server.webmvc.routes[0].uri=${MS_AUTH_URL:http://localhost:8082}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=ms-autor
spring.cloud.gateway.server.webmvc.routes[1].uri=${MS_AUTOR_URL:http://localhost:8083}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/autores/**

spring.cloud.gateway.server.webmvc.routes[2].id=ms-libro
spring.cloud.gateway.server.webmvc.routes[2].uri=${MS_LIBRO_URL:http://localhost:8084}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/libros/**

spring.cloud.gateway.server.webmvc.routes[3].id=ms-biblioteca-v2
spring.cloud.gateway.server.webmvc.routes[3].uri=${MS_BIBLIOTECA_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v2/**

spring.cloud.gateway.server.webmvc.routes[4].id=ms-biblioteca-carreras-v1
spring.cloud.gateway.server.webmvc.routes[4].uri=${MS_BIBLIOTECA_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/carreras/**

# Rutas de Swagger del microservicio biblioteca, expuestas a través del Gateway
spring.cloud.gateway.server.webmvc.routes[5].id=ms-biblioteca-swagger-ui
spring.cloud.gateway.server.webmvc.routes[5].uri=${MS_BIBLIOTECA_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/doc/**

spring.cloud.gateway.server.webmvc.routes[6].id=ms-biblioteca-api-docs
spring.cloud.gateway.server.webmvc.routes[6].uri=${MS_BIBLIOTECA_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/v3/api-docs/**

spring.cloud.gateway.server.webmvc.routes[7].id=ms-biblioteca-swagger-resources
spring.cloud.gateway.server.webmvc.routes[7].uri=${MS_BIBLIOTECA_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/swagger-ui/**
